<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Can I Catch It?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────────── */
    :root {
      --bg:           #ffffff;
      --surface:      #f5f5f5;
      --surface2:     #ececec;
      --surface3:     #e0e0e0;
      --green:        #1a5c1a;
      --green-dim:    rgba(26, 92, 26, 0.08);
      --yellow:       #7a5500;
      --yellow-dim:   rgba(122, 85, 0, 0.08);
      --red:          #8b0000;
      --red-dim:      rgba(139, 0, 0, 0.06);
      --text:         #000000;
      --text-muted:   #666666;
      --text-dim:     #aaaaaa;
      --border:       #dddddd;
      --border-light: #eeeeee;
      --border-heavy: #000000;
      --radius:       0px;
      --radius-sm:    0px;
      --font-serif:   'Playfair Display', 'Georgia', serif;
      --font-body:    'Inter', -apple-system, sans-serif;
      --font-mono:    'IBM Plex Mono', 'Courier New', monospace;
    }

    /* ── Reset / base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Header ────────────────────────────────────────────────────────────── */
    header {
      background: var(--bg);
      border-bottom: 2px solid var(--border-heavy);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0 10px;
      gap: 32px;
    }
    .header-search {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 10px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    .header-search-input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 0;
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      letter-spacing: 0.03em;
    }
    .header-search-input::placeholder { color: var(--text-dim); }
    .header-search-input:focus { border-color: var(--text); }
    .header-search-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border-heavy);
      color: var(--text);
      padding: 6px 12px;
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      white-space: nowrap;
    }
    .header-search-btn:hover { background: var(--text); color: var(--bg); }
    .header-search-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      flex-shrink: 0;
    }
    .logo {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.01em;
      color: var(--text);
      flex-shrink: 0;
      line-height: 1;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }
    .header-dateline {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    #locationLabel {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #clockDisplay {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .refresh-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border-heavy);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 0;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .refresh-btn:hover { background: var(--text); color: var(--bg); }
    .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main layout ───────────────────────────────────────────────────────── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    /* ── Summary bar ───────────────────────────────────────────────────────── */
    .summary-bar {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      margin-bottom: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 24px;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .summary-pill {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .errors-bar {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-dim);
      padding: 0 0 12px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-green  { background: #889063; }
    .dot-yellow { background: #CE5A43; }
    .dot-red    { background: #AB482D; }
    .dot-gray   { background: var(--text-dim); }
    .summary-updated {
      margin-left: auto;
      color: var(--text-muted);
    }

    /* ── Section heading ───────────────────────────────────────────────────── */
    .section-heading {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 0;
      padding: 7px 0;
      border-top: 1px solid var(--border-heavy);
      border-bottom: 1px solid var(--border);
    }
    .section-block { margin-bottom: 32px; }

    /* ── Movie card ────────────────────────────────────────────────────────── */
    .card {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
      margin-bottom: 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
      transition: opacity 0.15s;
    }
    .card:first-child { border-top: 1px solid var(--border); }

    .card.too-late { opacity: 0.45; }

    /* Left column */
    .card-left { min-width: 0; }
    .card-title {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.2;
      text-transform: uppercase;
    }
    .card-title a:hover { text-decoration: underline; }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .meta-sep { color: var(--border); }
    .chain-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      padding: 1px 5px;
      background: var(--text);
      color: var(--bg);
      letter-spacing: 0.05em;
    }
    .preshow-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 1px 5px;
      color: var(--text-muted);
      border: 1px solid var(--border);
      letter-spacing: 0.04em;
    }
    .screenslate-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 1px 5px;
      color: #4a3470;
      background: #e0d6f5;
      border: 1px solid #c4b5e8;
      letter-spacing: 0.04em;
    }
    .oc-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      padding: 1px 5px;
      color: #889063;
      background: rgba(136, 144, 99, 0.12);
      border: 1px solid #889063;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-title-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      min-width: 0;
    }
    .card-title-row .card-title {
      margin-bottom: 0;
      flex: 1;
      min-width: 0;
    }
    .card-footer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px 14px;
      font-family: var(--font-mono);
      font-size: 11px;
    }
    .footer-item {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-muted);
    }
    .leave-cta {
      color: var(--text);
    }
    .leave-cta.urgent { color: #CE5A43; font-weight: 600; }
    .leave-cta.now    { color: #AB482D; font-weight: 600; }

    /* Right column */
    .card-right {
      text-align: right;
      flex-shrink: 0;
      min-width: 110px;
    }
    .showtime-big {
      font-family: var(--font-mono);
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .actual-start {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 0;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 1px solid;
    }
    .status-badge.catchable { background: #889063; color: #ffffff; border-color: #889063; }
    .status-badge.close     { background: #CE5A43; color: #ffffff; border-color: #CE5A43; }
    .status-badge.too-late  { background: #AB482D; color: #ffffff; border-color: #AB482D; }

    /* ── States ────────────────────────────────────────────────────────────── */
    .state-center {
      text-align: center;
      padding: 80px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .state-icon {
      font-family: var(--font-serif);
      font-size: 48px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
    }
    .state-icon.pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    .state-title {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 700;
    }
    .state-sub {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 360px;
      font-style: italic;
    }
    .btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 11px 28px;
      border-radius: 0;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 9px 20px;
      border-radius: 0;
      font-family: var(--font-mono);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }

    .progress-bar {
      width: 200px;
      height: 2px;
      background: var(--surface2);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--text);
      animation: progress 2.5s ease-in-out infinite;
    }
    @keyframes progress {
      0%   { width: 0%; margin-left: 0; }
      50%  { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }

    /* ── Address input ─────────────────────────────────────────────────────── */
    .address-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 380px;
    }
    .address-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-heavy);
      border-radius: 0;
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      text-align: center;
      letter-spacing: 0.03em;
    }
    .address-input::placeholder { color: var(--text-dim); }
    .address-input:focus { border-color: var(--text); }
    .divider {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    /* ── Empty section ─────────────────────────────────────────────────────── */
    .empty-section {
      padding: 20px;
      text-align: center;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 1px dashed var(--border);
    }

    /* ── Mobile location label (hidden on desktop) ─────────────────────────── */
    .mobile-location-label {
      display: none;
    }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 540px) {
      /* Header — tighten up so nothing overflows */
      header { padding: 0 16px; }
      .header-top { gap: 10px; padding: 10px 0 8px; }
      .logo { font-size: 20px; }
      #locationLabel { display: none; } /* shown in search row instead */
      .header-right { gap: 10px; }
      #clockDisplay { font-size: 12px; }
      .refresh-label { display: none; } /* icon-only on mobile */
      .refresh-btn { padding: 6px 8px; }

      /* Search row */
      .header-search { flex-wrap: wrap; gap: 6px; }
      .header-search-input { font-size: 12px; }

      /* Location label moves into search row on mobile */
      .mobile-location-label {
        display: block;
        width: 100%;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding-bottom: 2px;
      }
      .mobile-location-label:empty { display: none; }

      /* Main layout */
      main { padding: 20px 16px 80px; }

      /* Summary bar */
      .summary-bar { gap: 4px 14px; font-size: 10px; }
      .summary-updated { margin-left: 0; width: 100%; }

      /* Cards — stack vertically, allow title to wrap */
      .card { grid-template-columns: 1fr; gap: 8px; padding: 12px 0; }
      .card-title { font-size: 16px; white-space: normal; line-height: 1.25; }
      .card-right { text-align: left; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
      .showtime-big { font-size: 20px; }
      .actual-start { margin-bottom: 0; }
      .card-meta { font-size: 10px; gap: 3px 8px; }
      .card-footer { font-size: 10px; }

      /* Section headings */
      .section-heading { font-size: 9px; }

      /* Status badge smaller */
      .status-badge { font-size: 9px; padding: 2px 6px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">Can I Catch It?</div>
    <div id="locationLabel">–</div>
    <div class="header-right">
      <div id="clockDisplay">--:-- --</div>
      <button class="refresh-btn" id="refreshBtn" onclick="refresh()">
        <svg id="refreshIcon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        <span class="refresh-label">Refresh</span>
      </button>
    </div>
  </div>
  <div class="header-search">
    <span class="header-search-label">From</span>
    <input class="header-search-input" id="headerAddressInput" type="text"
      placeholder="Address or intersection…"
      onkeydown="if(event.key==='Enter') startFromAddress()" />
    <button class="header-search-btn" onclick="startFromAddress()">Search</button>
    <button class="header-search-btn" onclick="startLoading()" title="Use my GPS location">GPS</button>
    <div id="mobileLocationLabel" class="mobile-location-label"></div>
  </div>
</header>

<main id="main">
  <div class="state-center">
    <div class="state-icon pulse">C</div>
    <div class="state-title">Can I Catch It?</div>
    <div class="state-sub">Enter an address above, or use your GPS to find movies you can still make.</div>
    <button class="btn" onclick="startLoading()">Use My GPS Location</button>
  </div>
</main>

<script>
// ── Config (mirrors server.js) ─────────────────────────────────────────────
const PRESHOW_BY_CHAIN = {
  AMC: 25, REGAL: 20, CINEMARK: 15, ALAMO: 15,
  ARCLIGHT: 15, LANDMARK: 10, ANGELIKA: 10, IFC: 10, NITEHAWK: 10,
};

// ── Theater ticketing URLs (matched by substring of theater name) ───────────
const THEATER_URLS = [
  { match: 'BAM',              url: 'https://www.bam.org/films' },
  { match: 'ALAMO',            url: 'https://drafthouse.com/new-york' },
  { match: 'AMC ATLANTIC',     url: 'https://www.amctheatres.com/movie-theatres/new-york/amc-atlantic-terminal-16' },
  { match: 'AMC EMPIRE',       url: 'https://www.amctheatres.com/movie-theatres/new-york/amc-empire-25' },
  { match: 'AMC',              url: 'https://www.amctheatres.com' },
  { match: 'NITEHAWK',         url: 'https://nitehawkcinema.com' },
  { match: 'IFC',              url: 'https://www.ifccenter.com' },
  { match: 'FILM FORUM',       url: 'https://filmforum.org' },
  { match: 'METROGRAPH',       url: 'https://metrograph.com' },
  { match: 'REGAL UNION',      url: 'https://www.regmovies.com/theaters/regal-union-square/1187' },
  { match: 'REGAL',            url: 'https://www.regmovies.com' },
  { match: 'ANGELIKA',         url: 'https://www.angelikafilmcenter.com/nyc' },
  { match: 'CINEMARK',         url: 'https://www.cinemark.com' },
];

function getTheaterUrl(theaterName) {
  const upper = theaterName.toUpperCase();
  for (const { match, url } of THEATER_URLS) {
    if (upper.includes(match)) return url;
  }
  return null;
}

// ── State ──────────────────────────────────────────────────────────────────
function setLocationLabel(text) {
  document.getElementById('locationLabel').textContent = text;
  const mob = document.getElementById('mobileLocationLabel');
  if (mob) mob.textContent = text;
}

let userLocation = null;
let theaterLocations = new Map(); // address → {lat, lng}
let lastRender = null;

// Client-side transit cache — avoids redundant /api/transit calls during auto-refresh
// Keyed by "originLat,originLng->destLat,destLng", TTL matches server-side 10 min cache
const clientTransitCache = new Map();
const CLIENT_TRANSIT_TTL = 10 * 60 * 1000;

// ── Clock ──────────────────────────────────────────────────────────────────
function tickClock() {
  document.getElementById('clockDisplay').textContent =
    new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/New_York' });
}
setInterval(tickClock, 1000);
tickClock();

// ── Helpers ────────────────────────────────────────────────────────────────
function fmt(ms) {
  return new Date(ms).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/New_York' });
}
function fmtMins(mins) {
  mins = Math.round(mins);
  if (mins < 60) return `${mins}m`;
  return `${Math.floor(mins / 60)}h ${mins % 60 > 0 ? (mins % 60) + 'm' : ''}`.trim();
}
function pluralize(n, word) { return `${n} ${word}${n !== 1 ? 's' : ''}`; }

// ── Status computation ─────────────────────────────────────────────────────
function computeStatus(showtimeMs, transitMins, preshowMins) {
  const now = Date.now();
  const actualStartMs  = showtimeMs + preshowMins * 60000;
  const arrivalMs      = now + transitMins * 60000;
  const bufferMins     = (actualStartMs - arrivalMs) / 60000;
  const leaveByMs      = actualStartMs - transitMins * 60000;
  const leaveInMins    = (leaveByMs - now) / 60000;

  let status;
  if (bufferMins >= 5)      status = 'catchable';
  else if (bufferMins >= 0) status = 'close';
  else                      status = 'too-late';

  return { status, bufferMins, leaveByMs, leaveInMins, actualStartMs };
}

// ── Fetch helpers ──────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const res = await fetch(url);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function geocodeTheater(address) {
  if (!address) return null;
  if (theaterLocations.has(address)) return theaterLocations.get(address);
  try {
    const loc = await fetchJSON(`/api/geocode?address=${encodeURIComponent(address)}`);
    theaterLocations.set(address, loc);
    return loc;
  } catch { return null; }
}

async function getTransitTime(destLat, destLng) {
  if (!userLocation) return null;
  const cacheKey = `${userLocation.lat.toFixed(4)},${userLocation.lng.toFixed(4)}->${destLat},${destLng}`;
  const hit = clientTransitCache.get(cacheKey);
  if (hit && Date.now() - hit.ts < CLIENT_TRANSIT_TTL) return { mins: hit.mins, mode: hit.mode };
  try {
    const data = await fetchJSON(
      `/api/transit?origin_lat=${userLocation.lat}&origin_lng=${userLocation.lng}&dest_lat=${destLat}&dest_lng=${destLng}`
    );
    if (data.duration_seconds != null) {
      const result = { mins: data.duration_seconds / 60, mode: data.mode || 'transit' };
      clientTransitCache.set(cacheKey, { ...result, ts: Date.now() });
      return result;
    }
    return null;
  } catch { return null; }
}

// ── Main load flow ─────────────────────────────────────────────────────────
async function startFromAddress() {
  const input = document.getElementById('headerAddressInput');
  const address = input ? input.value.trim() : '';
  if (!address) return;

  setState('loading', 'Looking up address…');
  try {
    const loc = await fetchJSON(`/api/geocode?address=${encodeURIComponent(address)}`);
    userLocation = { lat: loc.lat, lng: loc.lng };
    setLocationLabel(address.length > 40 ? address.slice(0, 38) + '…' : address);
    await loadShowtimes();
  } catch (err) {
    setState('error', 'Address not found', err.message, true);
  }
}

async function startLoading() {
  setState('loading', 'Getting your location…');

  try {
    userLocation = await new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error('Geolocation not supported by this browser')); return; }
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
        (err) => reject(new Error(err.code === 1 ? 'Location access denied' : err.message)),
        { timeout: 12000, enableHighAccuracy: true }
      );
    });
  } catch (err) {
    setState('error', 'Location access needed',
      err.message + '. Please allow location access and try again.',
      true);
    return;
  }

  setLocationLabel(`${userLocation.lat.toFixed(4)}, ${userLocation.lng.toFixed(4)}`);
  await loadShowtimes();
}

async function loadShowtimes() {
  setState('loading', 'Finding nearby movies…');

  let theaters, fromCache = false, cachedAt = Date.now(), apiErrors = [];
  try {
    const data = await fetchJSON(`/api/showtimes?lat=${userLocation.lat}&lng=${userLocation.lng}`);
    theaters  = data.theaters  || [];
    fromCache = data.cached    || false;
    cachedAt  = data.cachedAt  || Date.now();
    apiErrors = data.errors    || [];
    if (theaters.length === 0) {
      setState('empty', 'No showtimes found', data.note || 'Try refreshing or check your API keys.');
      return;
    }
  } catch (err) {
    setState('error', 'Failed to fetch showtimes', err.message, true);
    return;
  }

  setState('loading', `Calculating travel times for ${theaters.length} theater${theaters.length !== 1 ? 's' : ''}…`);

  const enriched = await Promise.all(theaters.map(async (theater) => {
    const loc = await geocodeTheater(theater.address);
    const travelResult = loc ? await getTransitTime(loc.lat, loc.lng) : null;
    const transitMins = travelResult?.mins ?? 30;
    const travelMode  = travelResult?.mode ?? 'driving';
    return { ...theater, loc, transitMins, travelMode };
  }));

  const now = Date.now();
  const WINDOW_PAST   = 2 * 60 * 60000;
  const WINDOW_FUTURE = 4 * 60 * 60000;

  const entries = [];
  for (const theater of enriched) {
    for (const movie of theater.movies) {
      for (const slot of movie.times) {
        if (slot.timestamp < now - WINDOW_PAST)   continue;
        if (slot.timestamp > now + WINDOW_FUTURE) continue;

        const info = computeStatus(slot.timestamp, theater.transitMins, theater.preshow_minutes);
        entries.push({
          title:           movie.title,
          movieLink:       movie.link,
          theater:         theater.name,
          chain:           theater.chain,
          preshow:         theater.preshow_minutes,
          source:          movie.source || theater.source || null,
          oc:              slot.oc || false,
          transitMins:     theater.transitMins,
          travelMode:      theater.travelMode,
          showtime:        slot.timestamp,
          showtimeDisplay: slot.display,
          ...info,
        });
      }
    }
  }

  lastRender = { entries, updatedAt: Date.now(), cachedAt, fromCache, apiErrors };
  renderResults(lastRender);

  // Update refresh button label to show data age when serving from cache
  const ageMins = Math.round((Date.now() - cachedAt) / 60000);
  document.querySelector('#refreshBtn .refresh-label').textContent =
    (fromCache && ageMins > 0) ? `as of ${ageMins}m ago` : 'Refresh';
}

// ── Rendering ──────────────────────────────────────────────────────────────
function renderResults({ entries, updatedAt, apiErrors = [] }) {
  const live = entries.map((e) => ({
    ...e,
    ...computeStatus(e.showtime, e.transitMins, e.preshow),
  }));

  const nowMs     = Date.now();
  const catchable  = live.filter((e) => e.status === 'catchable' && e.showtime <= nowMs + 90 * 60000).sort((a, b) => a.showtime - b.showtime);
  const close      = live.filter((e) => e.status === 'close')                                        .sort((a, b) => a.showtime - b.showtime);
  const cantMake   = live.filter((e) => e.status === 'too-late' && e.bufferMins >= -30).sort((a, b) => a.showtime - b.showtime);

  let html = '';

  html += `
    <div class="summary-bar">
      <div class="summary-pill"><span class="dot dot-green"></span>${pluralize(catchable.length, 'movie')} catchable</div>
      <div class="summary-pill"><span class="dot dot-yellow"></span>${pluralize(close.length, 'movie')} close</div>
      <div class="summary-pill"><span class="dot dot-red"></span>${pluralize(cantMake.length, 'movie')} won't make</div>
      <div class="summary-updated">Updated ${fmt(updatedAt)}</div>
    </div>
    ${apiErrors.length > 0 ? `<div class="errors-bar">Data unavailable for: ${apiErrors.join(', ')}</div>` : ''}`;

  if (close.length > 0) {
    html += `<div class="section-block">
      <div class="section-heading">Cutting It Close</div>`;
    close.forEach((e) => { html += renderCard(e); });
    html += `</div>`;
  }

  html += `<div class="section-block">
    <div class="section-heading">Catchable Now</div>`;
  if (catchable.length === 0) {
    html += `<div class="empty-section">No catchable movies right now — check back soon or try Refresh.</div>`;
  } else {
    catchable.forEach((e) => { html += renderCard(e); });
  }
  html += `</div>`;

  if (cantMake.length > 0) {
    html += `<div class="section-block">
      <div class="section-heading">Can't Make It</div>`;
    cantMake.forEach((e) => { html += renderCard(e); });
    html += `</div>`;
  }

  document.getElementById('main').innerHTML = html;
}

function renderCard(e) {
  const { title, movieLink, theater, chain, preshow, source, oc, transitMins, travelMode, showtime, showtimeDisplay,
          status, bufferMins, leaveByMs, leaveInMins, actualStartMs } = e;

  let leaveCta = '';
  let leaveClass = '';
  if (status !== 'too-late') {
    if (leaveInMins <= 0) {
      leaveCta = 'Leave <strong>right now</strong>';
      leaveClass = 'now';
    } else if (leaveInMins < 5) {
      leaveCta = `Leave in <strong>${Math.ceil(leaveInMins)} min</strong>`;
      leaveClass = 'urgent';
    } else {
      leaveCta = `Leave by <strong>${fmt(leaveByMs)}</strong> (${fmtMins(leaveInMins)})`;
    }
  } else {
    const minsLate = Math.round(-bufferMins);
    if (showtime > Date.now()) {
      leaveCta = `You'd arrive ~${minsLate}m into the film`;
    } else {
      leaveCta = `Movie started ~${minsLate}m ago`;
    }
  }

  const chainBadge = chain ? `<span class="chain-badge">${chain}</span>` : '';
  const preshowBadge = preshow > 0 ? `<span class="preshow-badge">+${preshow}min trailers</span>` : '';
  const ssBadge = source === 'screenslate' ? `<span class="screenslate-badge">Screen Slate</span>` : '';
  const ocBadge = oc ? `<span class="oc-badge">OC</span>` : '';
  const actualStartNote = preshow > 0 ? `Movie starts ${fmt(actualStartMs)}` : `Starts ${fmt(actualStartMs)}`;

  const statusLabels = {
    'catchable': 'Catchable',
    'close':     'Close call',
    'too-late':  'Too late',
  };

  const ticketUrl = getTheaterUrl(theater) || movieLink;
  const titleEl = ticketUrl
    ? `<a href="${ticketUrl}" target="_blank" rel="noopener">${title}</a>`
    : title;

  return `
    <div class="card ${status}">
      <div class="card-left">
        <div class="card-title-row">
          <div class="card-title">${titleEl}</div>
        </div>
        <div class="card-meta">
          <span>${theater}</span>
          ${chainBadge}
          ${preshowBadge}
          ${ocBadge}
          ${ssBadge}
        </div>
        <div class="card-footer">
          <div class="footer-item"><span>${fmtMins(transitMins)} by ${travelMode === 'driving' ? 'car' : 'transit'}</span></div>
          <div class="footer-item leave-cta ${leaveClass}">${leaveCta}</div>
        </div>
      </div>
      <div class="card-right">
        <div class="showtime-big">${showtimeDisplay}</div>
        <div class="actual-start">${actualStartNote}</div>
        <span class="status-badge ${status}">${statusLabels[status]}</span>
      </div>
    </div>`;
}

// ── State screens ──────────────────────────────────────────────────────────
function setState(type, title, sub = '', showRetry = false) {
  const icons = { loading: 'C', error: '!', empty: 'C' };
  const icon = icons[type] || 'C';
  const pulseClass = type === 'loading' ? 'pulse' : '';
  const progress = type === 'loading'
    ? `<div class="progress-bar"><div class="progress-fill"></div></div>` : '';
  const retryBtn = showRetry
    ? `<button class="btn" onclick="startLoading()">Try Again</button>` : '';

  document.getElementById('main').innerHTML = `
    <div class="state-center">
      <div class="state-icon ${pulseClass}">${icon}</div>
      <div class="state-title">${title}</div>
      ${sub ? `<div class="state-sub">${sub}</div>` : ''}
      ${progress}
      ${retryBtn}
    </div>`;
}

// ── Refresh ────────────────────────────────────────────────────────────────
function refresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  if (lastRender) renderResults(lastRender);
  const action = userLocation ? loadShowtimes() : startLoading();
  action.finally(() => btn.classList.remove('spinning'));
}

setInterval(() => { if (userLocation) loadShowtimes(); }, 5 * 60 * 1000);
setInterval(() => { if (lastRender) renderResults(lastRender); }, 30 * 1000);

startLoading();
</script>
