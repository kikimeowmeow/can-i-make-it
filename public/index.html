<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CatchIt — Movies You Can Still Make</title>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────────── */
    :root {
      --bg:           #08080f;
      --surface:      #11111c;
      --surface2:     #1a1a28;
      --surface3:     #22223a;
      --accent:       #f5c518;
      --accent-dim:   rgba(245, 197, 24, 0.12);
      --green:        #22c55e;
      --green-dim:    rgba(34, 197, 94, 0.12);
      --yellow:       #f59e0b;
      --yellow-dim:   rgba(245, 158, 11, 0.12);
      --red:          #f87171;
      --red-dim:      rgba(248, 113, 113, 0.10);
      --text:         #e8e8f2;
      --text-muted:   #7070a0;
      --text-dim:     #404060;
      --border:       #2a2a40;
      --border-light: #1e1e30;
      --radius:       12px;
      --radius-sm:    8px;
    }

    /* ── Reset / base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Header ────────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #locationLabel {
      font-size: 12px;
      color: var(--text-muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #clockDisplay {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .refresh-btn {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .refresh-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border-light); }
    .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main layout ───────────────────────────────────────────────────────── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    /* ── Summary bar ───────────────────────────────────────────────────────── */
    .summary-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      margin-bottom: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 20px;
      align-items: center;
      font-size: 13px;
    }
    .summary-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green  { background: var(--green); }
    .dot-yellow { background: var(--yellow); }
    .dot-red    { background: var(--red); }
    .dot-gray   { background: var(--text-dim); }
    .summary-updated {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* ── Section heading ───────────────────────────────────────────────────── */
    .section-heading {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .section-block { margin-bottom: 32px; }

    /* ── Movie card ────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
      transition: border-color 0.15s, opacity 0.15s;
    }
    .card:last-child { margin-bottom: 0; }

    .card.catchable  { border-left: 3px solid var(--green);  background: linear-gradient(90deg, rgba(34,197,94,0.04) 0%, var(--surface) 40%); }
    .card.close      { border-left: 3px solid var(--yellow); background: linear-gradient(90deg, rgba(245,158,11,0.05) 0%, var(--surface) 40%); }
    .card.too-late   { border-left: 3px solid var(--border); opacity: 0.55; }

    /* Left column */
    .card-left { min-width: 0; }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-title a:hover { color: var(--accent); }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 10px;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .chain-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--accent-dim);
      color: var(--accent);
      letter-spacing: 0.03em;
    }
    .preshow-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .card-footer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 14px;
      font-size: 12px;
    }
    .footer-item {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-muted);
    }
    .leave-cta {
      font-weight: 600;
      color: var(--text);
    }
    .leave-cta.urgent { color: var(--yellow); }
    .leave-cta.now    { color: var(--red); }

    /* Right column */
    .card-right {
      text-align: right;
      flex-shrink: 0;
      min-width: 120px;
    }
    .showtime-big {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
      margin-bottom: 3px;
    }
    .actual-start {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-badge.catchable { background: var(--green-dim);  color: var(--green); }
    .status-badge.close     { background: var(--yellow-dim); color: var(--yellow); }
    .status-badge.too-late  { background: var(--red-dim);    color: var(--red); }

    /* ── States ────────────────────────────────────────────────────────────── */
    .state-center {
      text-align: center;
      padding: 80px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .state-icon { font-size: 44px; }
    .state-icon.pulse { animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.92); }
    }
    .state-title { font-size: 18px; font-weight: 700; }
    .state-sub   { font-size: 14px; color: var(--text-muted); max-width: 360px; }
    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 11px 24px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 9px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      cursor: pointer;
    }
    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

    .progress-bar {
      width: 200px;
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      animation: progress 3s ease-in-out infinite;
    }
    @keyframes progress {
      0%   { width: 0%; margin-left: 0; }
      50%  { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }

    /* ── Empty section ─────────────────────────────────────────────────────── */
    .empty-section {
      padding: 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 540px) {
      .card { grid-template-columns: 1fr; }
      .card-right { text-align: left; display: flex; align-items: center; gap: 12px; }
      .actual-start { margin-bottom: 0; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    🎬 CatchIt
  </div>
  <div id="locationLabel">Locating…</div>
  <div id="clockDisplay">--:-- --</div>
  <button class="refresh-btn" id="refreshBtn" onclick="refresh()">
    <svg id="refreshIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg>
    Refresh
  </button>
</header>

<main id="main">
  <div class="state-center">
    <div class="state-icon pulse">🎬</div>
    <div class="state-title">CatchIt</div>
    <div class="state-sub">Find movies you can still make — factoring in travel time and pre-show trailers.</div>
    <button class="btn" onclick="startLoading()">Find Movies Near Me</button>
  </div>
</main>

<script>
// ── Config (mirrors server.js) ─────────────────────────────────────────────
const PRESHOW_BY_CHAIN = {
  AMC: 25, REGAL: 20, CINEMARK: 15, ALAMO: 15,
  ARCLIGHT: 15, LANDMARK: 10, ANGELIKA: 10, IFC: 10, NITEHAWK: 10,
};

// ── State ──────────────────────────────────────────────────────────────────
let userLocation = null;
let theaterLocations = new Map(); // address → {lat, lng}
let lastRender = null;

// ── Clock ──────────────────────────────────────────────────────────────────
function tickClock() {
  document.getElementById('clockDisplay').textContent =
    new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}
setInterval(tickClock, 1000);
tickClock();

// ── Helpers ────────────────────────────────────────────────────────────────
function fmt(ms) {
  return new Date(ms).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}
function fmtMins(mins) {
  mins = Math.round(mins);
  if (mins < 60) return `${mins}m`;
  return `${Math.floor(mins / 60)}h ${mins % 60 > 0 ? (mins % 60) + 'm' : ''}`.trim();
}
function pluralize(n, word) { return `${n} ${word}${n !== 1 ? 's' : ''}`; }

// ── Status computation ─────────────────────────────────────────────────────
// Returns one of: "catchable" | "close" | "too-late"
// "catchable"  → you arrive before actual movie start with ≥5 min buffer
// "close"      → you arrive 0–5 min after movie starts OR just before with <5 min
// "too-late"   → you'd arrive after the movie has already started

function computeStatus(showtimeMs, transitMins, preshowMins) {
  const now = Date.now();
  const actualStartMs  = showtimeMs + preshowMins * 60000;    // when movie truly begins
  const arrivalMs      = now + transitMins * 60000;            // when you'd arrive
  const bufferMins     = (actualStartMs - arrivalMs) / 60000;  // minutes to spare after arriving
  const leaveByMs      = actualStartMs - transitMins * 60000;  // latest you can leave
  const leaveInMins    = (leaveByMs - now) / 60000;            // how long until you must leave

  let status;
  if (bufferMins >= 5)      status = 'catchable';
  else if (bufferMins >= 0) status = 'close';
  else                      status = 'too-late';

  return { status, bufferMins, leaveByMs, leaveInMins, actualStartMs };
}

// ── Fetch helpers ──────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const res = await fetch(url);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function geocodeTheater(address) {
  if (!address) return null;
  if (theaterLocations.has(address)) return theaterLocations.get(address);
  try {
    const loc = await fetchJSON(`/api/geocode?address=${encodeURIComponent(address)}`);
    theaterLocations.set(address, loc);
    return loc;
  } catch { return null; }
}

async function getTransitTime(destLat, destLng) {
  if (!userLocation) return null;
  try {
    const { origin_lat: oLat, origin_lng: oLng } = {
      origin_lat: userLocation.lat, origin_lng: userLocation.lng
    };
    const data = await fetchJSON(
      `/api/transit?origin_lat=${oLat}&origin_lng=${oLng}&dest_lat=${destLat}&dest_lng=${destLng}`
    );
    return data.duration_seconds != null ? data.duration_seconds / 60 : null;
  } catch { return null; }
}

// ── Main load flow ─────────────────────────────────────────────────────────
async function startLoading() {
  const main = document.getElementById('main');
  const locLabel = document.getElementById('locationLabel');

  setState('loading', 'Getting your location…');

  // 1. Get geolocation
  try {
    userLocation = await new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error('Geolocation not supported by this browser')); return; }
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
        (err) => reject(new Error(err.code === 1 ? 'Location access denied' : err.message)),
        { timeout: 12000, enableHighAccuracy: true }
      );
    });
  } catch (err) {
    setState('error', 'Location access needed',
      err.message + '. Please allow location access and try again.',
      true);
    return;
  }

  locLabel.textContent = `📍 ${userLocation.lat.toFixed(4)}, ${userLocation.lng.toFixed(4)}`;
  setState('loading', 'Finding nearby movies…');

  // 2. Fetch showtimes
  let theaters;
  try {
    const data = await fetchJSON(`/api/showtimes?lat=${userLocation.lat}&lng=${userLocation.lng}`);
    theaters = data.theaters || [];
    if (theaters.length === 0) {
      setState('empty', 'No showtimes found', data.note || 'Try refreshing or check your API keys.');
      return;
    }
  } catch (err) {
    setState('error', 'Failed to fetch showtimes', err.message, true);
    return;
  }

  setState('loading', `Calculating travel times for ${theaters.length} theater${theaters.length !== 1 ? 's' : ''}…`);

  // 3. Geocode all theaters + fetch transit in parallel
  const enriched = await Promise.all(theaters.map(async (theater) => {
    const loc = await geocodeTheater(theater.address);
    const transitMins = loc
      ? (await getTransitTime(loc.lat, loc.lng)) ?? 30
      : 30; // fallback if no geocode
    return { ...theater, loc, transitMins };
  }));

  // 4. Flatten to individual showtime entries & compute status
  const now = Date.now();
  const WINDOW_PAST   = 2  * 60 * 60000; // show up to 2h ago (might still be catchable w/ preshow)
  const WINDOW_FUTURE = 3  * 60 * 60000; // show up to 3h ahead

  const entries = [];
  for (const theater of enriched) {
    for (const movie of theater.movies) {
      for (const slot of movie.times) {
        if (slot.timestamp < now - WINDOW_PAST)   continue;
        if (slot.timestamp > now + WINDOW_FUTURE) continue;

        const info = computeStatus(slot.timestamp, theater.transitMins, theater.preshow_minutes);
        entries.push({
          title:         movie.title,
          movieLink:     movie.link,
          theater:       theater.name,
          chain:         theater.chain,
          preshow:       theater.preshow_minutes,
          transitMins:   theater.transitMins,
          showtime:      slot.timestamp,
          showtimeDisplay: slot.display,
          ...info,
        });
      }
    }
  }

  lastRender = { entries, updatedAt: Date.now() };
  renderResults(lastRender);
}

// ── Rendering ──────────────────────────────────────────────────────────────
function renderResults({ entries, updatedAt }) {
  // Re-compute status at render time (user might be watching the clock)
  const live = entries.map((e) => ({
    ...e,
    ...computeStatus(e.showtime, e.transitMins, e.preshow),
  }));

  const catchable = live.filter((e) => e.status === 'catchable').sort((a, b) => a.showtime - b.showtime);
  const close     = live.filter((e) => e.status === 'close')    .sort((a, b) => a.showtime - b.showtime);
  const late      = live.filter((e) => e.status === 'too-late') .sort((a, b) => a.showtime - b.showtime);

  let html = '';

  // Summary bar
  html += `
    <div class="summary-bar">
      <div class="summary-pill"><span class="dot dot-green"></span>${pluralize(catchable.length, 'movie')} catchable</div>
      <div class="summary-pill"><span class="dot dot-yellow"></span>${pluralize(close.length, 'movie')} cutting it close</div>
      <div class="summary-pill"><span class="dot dot-red"></span>${pluralize(late.length, 'movie')} started</div>
      <div class="summary-updated">Updated ${fmt(updatedAt)}</div>
    </div>`;

  // Catchable section
  html += `<div class="section-block">
    <div class="section-heading">✓ Catchable Now</div>`;
  if (catchable.length === 0) {
    html += `<div class="empty-section">No catchable movies right now — check back soon or try Refresh.</div>`;
  } else {
    catchable.forEach((e) => { html += renderCard(e); });
  }
  html += `</div>`;

  // Close section
  if (close.length > 0) {
    html += `<div class="section-block">
      <div class="section-heading">⚡ Cutting It Close</div>`;
    close.forEach((e) => { html += renderCard(e); });
    html += `</div>`;
  }

  // Too late section
  if (late.length > 0) {
    html += `<div class="section-block">
      <div class="section-heading">Already Started</div>`;
    late.forEach((e) => { html += renderCard(e); });
    html += `</div>`;
  }

  document.getElementById('main').innerHTML = html;
}

function renderCard(e) {
  const { title, movieLink, theater, chain, preshow, transitMins, showtime, showtimeDisplay,
          status, bufferMins, leaveByMs, leaveInMins, actualStartMs } = e;

  // Leave CTA
  let leaveCta = '';
  let leaveClass = '';
  if (status !== 'too-late') {
    if (leaveInMins <= 0) {
      leaveCta = '🚨 Leave <strong>right now!</strong>';
      leaveClass = 'now';
    } else if (leaveInMins < 5) {
      leaveCta = `⚡ Leave in <strong>${Math.ceil(leaveInMins)} min</strong>`;
      leaveClass = 'urgent';
    } else {
      leaveCta = `Leave by <strong>${fmt(leaveByMs)}</strong> (${Math.round(leaveInMins)}m away)`;
    }
  } else {
    const minsLate = Math.round(-bufferMins);
    leaveCta = `Movie started ~${minsLate}m ago`;
    leaveClass = '';
  }

  // Chain badge
  const chainBadge = chain
    ? `<span class="chain-badge">${chain}</span>`
    : '';

  // Pre-show badge
  const preshowBadge = preshow > 0
    ? `<span class="preshow-badge">+${preshow}min trailers</span>`
    : '';

  // Actual movie start (when trailers end)
  const actualStartNote = preshow > 0
    ? `Movie starts ${fmt(actualStartMs)}`
    : `Starts ${fmt(actualStartMs)}`;

  // Status label
  const statusLabels = {
    'catchable': '✓ Catchable',
    'close':     '⚡ Close call',
    'too-late':  '✗ Too late',
  };

  const titleEl = movieLink
    ? `<a href="${movieLink}" target="_blank" rel="noopener">${title}</a>`
    : title;

  return `
    <div class="card ${status}">
      <div class="card-left">
        <div class="card-title">${titleEl}</div>
        <div class="card-meta">
          <span>${theater}</span>
          ${chainBadge}
          ${preshowBadge}
        </div>
        <div class="card-footer">
          <div class="footer-item">
            🚇 <span>${fmtMins(transitMins)} by transit</span>
          </div>
          <div class="footer-item leave-cta ${leaveClass}">${leaveCta}</div>
        </div>
      </div>
      <div class="card-right">
        <div class="showtime-big">${showtimeDisplay}</div>
        <div class="actual-start">${actualStartNote}</div>
        <span class="status-badge ${status}">${statusLabels[status]}</span>
      </div>
    </div>`;
}

// ── State screens ──────────────────────────────────────────────────────────
function setState(type, title, sub = '', showRetry = false) {
  const icons = { loading: '🎬', error: '⚠️', empty: '🍿' };
  const icon = icons[type] || '🎬';
  const pulseClass = type === 'loading' ? 'pulse' : '';
  const progress = type === 'loading'
    ? `<div class="progress-bar"><div class="progress-fill"></div></div>` : '';
  const retryBtn = showRetry
    ? `<button class="btn" onclick="startLoading()">Try Again</button>` : '';

  document.getElementById('main').innerHTML = `
    <div class="state-center">
      <div class="state-icon ${pulseClass}">${icon}</div>
      <div class="state-title">${title}</div>
      ${sub ? `<div class="state-sub">${sub}</div>` : ''}
      ${progress}
      ${retryBtn}
    </div>`;
}

// ── Refresh ────────────────────────────────────────────────────────────────
function refresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  // If we have data, re-render live first (catches status changes from elapsed time)
  if (lastRender) renderResults(lastRender);
  // Then re-fetch in background
  startLoading().finally(() => btn.classList.remove('spinning'));
}

// Auto-refresh every 5 minutes
setInterval(() => {
  if (userLocation) startLoading();
